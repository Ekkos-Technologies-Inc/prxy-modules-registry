name: notify-marketplace

# When index.json changes on main, fire a repository_dispatch event at
# Ekkos-Technologies-Inc/prxy-monster so modules.prxy.monster rebuilds with
# the latest registry contents.
#
# Required secret on THIS repo:
#   MARKETPLACE_DISPATCH_TOKEN — a fine-grained PAT scoped to
#     repo:dispatch on Ekkos-Technologies-Inc/prxy-monster (no other perms).
#
# If the token is missing the step fails fast — that's intentional, so a
# silent registry → marketplace drift can't happen unnoticed.

on:
  push:
    branches: [main]
    paths:
      - 'index.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch at prxy-monster
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::error::MARKETPLACE_DISPATCH_TOKEN secret is not set."
            echo "Create a fine-grained PAT (repo:dispatch on Ekkos-Technologies-Inc/prxy-monster)"
            echo "and add it as a repo secret named MARKETPLACE_DISPATCH_TOKEN."
            exit 1
          fi
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Ekkos-Technologies-Inc/prxy-monster/dispatches \
            -d '{"event_type":"registry-updated","client_payload":{"reason":"index.json changed","commit":"${{ github.sha }}"}}'
          echo "[notify-marketplace] dispatched registry-updated event."
