name: index

# Regenerates index.json on every push to main and commits it back if it
# changed. modules.prxy.monster fetches index.json on its own build cycle.

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'scripts/generate-index.ts'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Generate index.json
        run: npm run generate-index
      - name: Commit index.json if changed
        run: |
          if [[ -n "$(git status --porcelain index.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.json
            git commit -m "chore(index): regenerate from manifests"
            git push
          else
            echo "index.json unchanged — skipping commit."
          fi
